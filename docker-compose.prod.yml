services:
  # ===== INIT: Create database if not exists =====
  db-init:
    image: postgres:alpine
    container_name: openwa-db-init
    restart: "no"
    networks:
      - postgres-net
    environment:
      - PGPASSWORD=${DATABASE_PASSWORD}
      - DB_HOST=${DATABASE_HOST:-10.133.21.24}
      - DB_PORT=${DATABASE_PORT:-5433}
      - DB_USER=${DATABASE_USERNAME:-bpsdemak}
      - DB_NAME=${DATABASE_NAME:-openwa}
    entrypoint:
      - sh
      - -c
      - |
        until pg_isready -h $$DB_HOST -p $$DB_PORT -U $$DB_USER; do
          echo "Waiting for PostgreSQL at $$DB_HOST:$$DB_PORT..."
          sleep 2
        done
        echo "PostgreSQL is ready."
        if psql -h $$DB_HOST -p $$DB_PORT -U $$DB_USER -lqt | cut -d'|' -f1 | grep -qw $$DB_NAME; then
          echo "Database '$$DB_NAME' already exists, skipping."
        else
          echo "Creating database '$$DB_NAME'..."
          psql -h $$DB_HOST -p $$DB_PORT -U $$DB_USER -c "CREATE DATABASE \"$$DB_NAME\";"
          echo "Database '$$DB_NAME' created."
        fi

  # ===== CORE: OpenWA Backend API =====
  openwa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openwa-api
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-2785}:2785"
    expose:
      - "2785"
    environment:
      # Core settings
      - NODE_ENV=production
      - PORT=2785
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Database connection (PostgreSQL)
      - DATABASE_TYPE=postgres
      - DATABASE_HOST=${DATABASE_HOST:-10.133.21.24}
      - DATABASE_PORT=${DATABASE_PORT:-5433}
      - DATABASE_NAME=${DATABASE_NAME:-openwa}
      - DATABASE_USERNAME=${DATABASE_USERNAME:-bpsdemak}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_SYNCHRONIZE=${DATABASE_SYNCHRONIZE:-true}
      # WA Engine configuration
      - ENGINE_TYPE=whatsapp-web.js
      - SESSION_DATA_PATH=/app/data/sessions
      - PUPPETEER_HEADLESS=true
      - PUPPETEER_ARGS=--no-sandbox,--disable-setuid-sandbox,--disable-dev-shm-usage,--disable-gpu
      # Local Storage
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/data/media
      - PLUGINS_ENABLED=true
      - PLUGINS_DIR=/app/data/plugins
    volumes:
      - openwa-prod-data:/app/data
    networks:
      - openwa-net
      - postgres-net
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:2785/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===== CORE: Dashboard Frontend (nginx serving static React app) =====
  openwa-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: openwa-dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT:-2886}:80"
    depends_on:
      openwa:
        condition: service_healthy
    networks:
      - openwa-net

volumes:
  openwa-prod-data:
    driver: local

networks:
  openwa-net:
    name: openwa-prod-network
  # External network connection to access your existing PostgreSQL container
  postgres-net:
    name: ${EXTERNAL_NETWORK:-postgres-stack_ai_net}
    external: true
